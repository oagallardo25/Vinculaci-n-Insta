<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a2744">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>INSTA · Vinculación</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');

  :root {
    --navy:    #1a2744;
    --navy2:   #243056;
    --blue:    #2d5be3;
    --blue-lt: #4a74f0;
    --gold:    #f5a623;
    --white:   #ffffff;
    --grey0:   #f0f3fb;
    --grey1:   #dde3f4;
    --grey2:   #9aa3bf;
    --grey3:   #5a6380;
    --text:    #1a2040;

    /* estado colors */
    --en-curso:   #2563eb;
    --sin-real:   #dc2626;
    --con-doc:    #16a34a;
    --sin-doc:    #d97706;

    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(26,39,68,.13);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--grey0);
    color: var(--text);
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 18px 20px 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.15rem; font-weight: 700;
    color: var(--white); letter-spacing: .3px;
  }
  header p { font-size: .72rem; color: var(--grey2); margin-top: 2px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  #sync-btn {
    background: var(--blue); color: var(--white);
    border: none; border-radius: 20px;
    font-size: .72rem; font-weight: 600;
    padding: 6px 14px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background .2s;
  }
  #sync-btn:active { background: var(--blue-lt); }
  #sync-btn svg { width: 14px; height: 14px; }

  /* ── TABS ── */
  .tabs {
    display: flex; overflow-x: auto; gap: 6px;
    padding: 12px 16px 0;
    background: var(--navy);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    background: rgba(255,255,255,.1);
    color: var(--grey2);
    border: none; border-radius: 20px 20px 0 0;
    padding: 8px 16px;
    font-family: 'Inter', sans-serif;
    font-size: .75rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .tab.active {
    background: var(--grey0);
    color: var(--navy);
  }

  /* ── CONTENT ── */
  main { padding: 16px; }

  /* ── SEARCH + FILTER ── */
  .controls {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 14px;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--grey2);
  }
  #search {
    width: 100%; padding: 11px 12px 11px 36px;
    border: 1.5px solid var(--grey1);
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: .88rem;
    background: var(--white); color: var(--text);
    outline: none; transition: border-color .2s;
  }
  #search:focus { border-color: var(--blue); }

  .filter-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: .72rem; font-weight: 600;
    border: 1.5px solid var(--grey1);
    background: var(--white); color: var(--grey3);
    cursor: pointer; transition: all .15s;
    white-space: nowrap;
  }
  .pill.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

  /* ── STATS BAR ── */
  .stats {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 8px; margin-bottom: 14px;
  }
  .stat {
    background: var(--white);
    border-radius: var(--radius-sm);
    padding: 10px 6px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num { font-size: 1.3rem; font-weight: 700; }
  .stat-lbl { font-size: .6rem; color: var(--grey3); margin-top: 2px; line-height: 1.2; }
  .stat-num.en-curso  { color: var(--en-curso); }
  .stat-num.sin-real  { color: var(--sin-real); }
  .stat-num.con-doc   { color: var(--con-doc); }
  .stat-num.sin-doc   { color: var(--sin-doc); }

  /* ── CARDS ── */
  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--grey1);
    cursor: pointer; transition: transform .1s, box-shadow .1s;
    position: relative;
  }
  .card:active { transform: scale(.98); }
  .card.en-curso  { border-left-color: var(--en-curso); }
  .card.sin-real  { border-left-color: var(--sin-real); }
  .card.con-doc   { border-left-color: var(--con-doc); }
  .card.sin-doc   { border-left-color: var(--sin-doc); }
  .card-name {
    font-weight: 600; font-size: .92rem;
    margin-bottom: 4px; color: var(--text);
  }
  .card-meta {
    font-size: .73rem; color: var(--grey3);
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .meta-chip {
    background: var(--grey0);
    padding: 2px 8px; border-radius: 10px;
    font-size: .68rem;
  }
  .status-badge {
    position: absolute; right: 14px; top: 14px;
    padding: 3px 10px; border-radius: 20px;
    font-size: .65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .badge-en-curso { background: #dbeafe; color: var(--en-curso); }
  .badge-sin-real { background: #fee2e2; color: var(--sin-real); }
  .badge-con-doc  { background: #dcfce7; color: var(--con-doc); }
  .badge-sin-doc  { background: #fef3c7; color: var(--sin-doc); }

  /* ── EMPTY ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--grey2);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: .88rem; }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(10,16,36,.55);
    backdrop-filter: blur(3px);
    z-index: 200;
    display: none; align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 36px;
    width: 100%; max-width: 480px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--grey1);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    color: var(--navy); margin-bottom: 4px;
  }
  .modal-sub { font-size: .78rem; color: var(--grey3); margin-bottom: 20px; }
  .modal-label {
    font-size: .72rem; font-weight: 600;
    color: var(--grey3); text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 10px;
  }
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .status-opt {
    padding: 14px 10px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--grey1);
    text-align: center;
    cursor: pointer;
    font-size: .78rem; font-weight: 600;
    transition: all .15s;
    line-height: 1.3;
  }
  .status-opt:hover { transform: scale(1.02); }
  .status-opt.sel-en-curso { background:#dbeafe; border-color:var(--en-curso); color:var(--en-curso); }
  .status-opt.sel-sin-real { background:#fee2e2; border-color:var(--sin-real); color:var(--sin-real); }
  .status-opt.sel-con-doc  { background:#dcfce7; border-color:var(--con-doc);  color:var(--con-doc); }
  .status-opt.sel-sin-doc  { background:#fef3c7; border-color:var(--sin-doc);  color:var(--sin-doc); }
  .status-opt .opt-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

  .save-btn {
    width: 100%; padding: 15px;
    background: var(--blue); color: var(--white);
    border: none; border-radius: var(--radius-sm);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: background .2s;
  }
  .save-btn:active { background: var(--blue-lt); }
  .save-btn:disabled { background: var(--grey2); cursor: not-allowed; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: var(--white);
    padding: 12px 22px; border-radius: 30px;
    font-size: .82rem; font-weight: 600;
    box-shadow: var(--shadow);
    opacity: 0; transition: opacity .3s;
    z-index: 999; white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }

  /* ── LOADING ── */
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--grey1);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 60px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-wrap { text-align: center; padding: 40px 20px; }
  .loading-wrap p { color: var(--grey3); font-size: .82rem; margin-top: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>INSTA · Vinculación</h1>
      <p id="last-sync">Cargando datos...</p>
    </div>
    <button id="sync-btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Sincronizar
    </button>
  </div>
</header>

<!-- TABS por carrera -->
<div class="tabs">
  <button class="tab active" onclick="setTab('Todos')">Todos</button>
  <button class="tab" onclick="setTab('Electricidad')">Electricidad</button>
  <button class="tab" onclick="setTab('Electrónica')">Electrónica</button>
  <button class="tab" onclick="setTab('Redes y Telecomunicaciones')">Redes y Telec.</button>
  <button class="tab" onclick="setTab('Mecánica Automotriz')">Mec. Automotriz</button>
</div>

<main>
  <!-- Búsqueda y filtros -->
  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="search" placeholder="Buscar estudiante..." oninput="renderList()">
    </div>
    <div class="filter-row" id="filter-row">
      <button class="pill active" onclick="setFilter('')">Todos</button>
      <button class="pill" onclick="setFilter('En curso')">En curso</button>
      <button class="pill" onclick="setFilter('Sin realizar')">Sin realizar</button>
      <button class="pill" onclick="setFilter('Culminado con documentación')">Con doc.</button>
      <button class="pill" onclick="setFilter('Culminado sin documentación')">Sin doc.</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Lista -->
  <div class="card-list" id="card-list">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p>Cargando estudiantes...</p>
    </div>
  </div>
</main>

<!-- Modal edición -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-label">Estado de Vinculación</div>
    <div class="status-grid">
      <div class="status-opt" onclick="selectStatus('En curso')">
        <span class="opt-icon">🔵</span>En curso
      </div>
      <div class="status-opt" onclick="selectStatus('Sin realizar')">
        <span class="opt-icon">🔴</span>Sin realizar
      </div>
      <div class="status-opt" onclick="selectStatus('Culminado con documentación')">
        <span class="opt-icon">🟢</span>Culminado con documentación
      </div>
      <div class="status-opt" onclick="selectStatus('Culminado sin documentación')">
        <span class="opt-icon">🟡</span>Culminado sin documentación
      </div>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveStatus()" disabled>
      Guardar cambio
    </button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIGURACIÓN — reemplaza con tu URL de Apps Script
// ═══════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz7VjECnZONVO5ChywLdtMEKlCWqJkfMIWv0m7I0PopBbt1LkTbK370XBcGDpo3Tmo4/exec';

// ═══════════════════════════════════════════════
let allStudents = [];
let currentTab    = 'Todos';
let currentFilter = '';
let editingRow    = null;
let selectedStatus = null;

// Mapa de estado → clave CSS
const statusClass = {
  'En curso':                       'en-curso',
  'Sin realizar':                   'sin-real',
  'Culminado con documentación':    'con-doc',
  'Culminado sin documentación':    'sin-doc',
};
const badgeClass = {
  'En curso':                       'badge-en-curso',
  'Sin realizar':                   'badge-sin-real',
  'Culminado con documentación':    'badge-con-doc',
  'Culminado sin documentación':    'badge-sin-doc',
};

// ─── CARGAR DATOS ───────────────────────────────
async function loadData() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '...';
  btn.disabled = true;

  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getAll`, { cache: 'no-store' });
    const json = await res.json();

    if (json.error) throw new Error(json.error);

    allStudents = json.students;
    const now = new Date();
    document.getElementById('last-sync').textContent =
      `Actualizado ${now.toLocaleTimeString('es-EC', {hour:'2-digit', minute:'2-digit'})}`;

    renderStats();
    renderList();
    toast('✅ Datos sincronizados');
  } catch (e) {
    console.error(e);
    toast('⚠️ Error al cargar. Verifica la conexión.');

    // Datos demo para vista previa
    if (allStudents.length === 0) loadDemo();
  } finally {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M23 4v6h-6M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg> Sincronizar`;
    btn.disabled = false;
  }
}

function loadDemo() {
  allStudents = [
    { row:2, nombre:'Delgado Pereira Bryan Alipio',   carrera:'Electricidad',               nivel:'Cuarto',  jornada:'Matutina',  vinculacion:'Sin realizar' },
    { row:3, nombre:'Quishpe Pilataxi Johan Michael', carrera:'Electricidad',               nivel:'Cuarto',  jornada:'Matutina',  vinculacion:'Sin realizar' },
    { row:10,nombre:'Ayo Mendoza Carlos Daniel',      carrera:'Redes y Telecomunicaciones', nivel:'Cuarto',  jornada:'Matutina',  vinculacion:'Sin realizar' },
    { row:11,nombre:'Jimenez Cisneros Juan Esteban',  carrera:'Redes y Telecomunicaciones', nivel:'Cuarto',  jornada:'Matutina',  vinculacion:'En curso' },
    { row:18,nombre:'Abalco Torres Danny Erick',      carrera:'Electrónica',                nivel:'Cuarto',  jornada:'Matutina',  vinculacion:'En curso' },
    { row:23,nombre:'Ayala Diaz Mateo Alejandro',     carrera:'Mecánica Automotriz',        nivel:'Cuarto',  jornada:'Matutina',  vinculacion:'Sin realizar' },
    { row:31,nombre:'Guaman Caguano Jose Samuel',     carrera:'Electricidad',               nivel:'Cuarto',  jornada:'Nocturna',  vinculacion:'Sin realizar' },
    { row:33,nombre:'Jumbo Quito Gustavo Andres',     carrera:'Electricidad',               nivel:'Tercero', jornada:'Nocturna',  vinculacion:'Culminado sin documentación' },
  ];
  document.getElementById('last-sync').textContent = 'Modo demo — configura Apps Script';
  renderStats();
  renderList();
}

// ─── TABS ───────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim() === tab ||
      (tab !== 'Todos' && t.textContent.includes(tab.substring(0,6))));
  });
  // fix active for Todos
  document.querySelectorAll('.tab').forEach(t => {
    if (tab === 'Todos') t.classList.toggle('active', t.textContent.trim() === 'Todos');
  });
  renderStats();
  renderList();
}

// ─── FILTRO ─────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => {
    const label = p.textContent.trim();
    const match = f === '' ? label === 'Todos'
      : label.toLowerCase().includes(f.toLowerCase().substring(0,5));
    p.classList.toggle('active', f === '' ? label === 'Todos' : p.dataset.val === f);
  });
  // simpler approach
  document.querySelectorAll('.pill').forEach((p,i) => {
    const vals = ['', 'En curso', 'Sin realizar', 'Culminado con documentación', 'Culminado sin documentación'];
    p.dataset.val = vals[i] || '';
    p.classList.toggle('active', p.dataset.val === f);
  });
  renderList();
}

// ─── FILTRAR ESTUDIANTES ─────────────────────────
function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return allStudents.filter(s => {
    const matchTab    = currentTab === 'Todos' || s.carrera === currentTab;
    const matchFilter = currentFilter === '' || s.vinculacion === currentFilter;
    const matchSearch = !q || s.nombre.toLowerCase().includes(q);
    return matchTab && matchFilter && matchSearch;
  });
}

// ─── STATS ──────────────────────────────────────
function renderStats() {
  const base = currentTab === 'Todos' ? allStudents : allStudents.filter(s => s.carrera === currentTab);
  const count = (v) => base.filter(s => s.vinculacion === v).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num en-curso">${count('En curso')}</div><div class="stat-lbl">En curso</div></div>
    <div class="stat"><div class="stat-num sin-real">${count('Sin realizar')}</div><div class="stat-lbl">Sin realizar</div></div>
    <div class="stat"><div class="stat-num con-doc">${count('Culminado con documentación')}</div><div class="stat-lbl">Con doc.</div></div>
    <div class="stat"><div class="stat-num sin-doc">${count('Culminado sin documentación')}</div><div class="stat-lbl">Sin doc.</div></div>
  `;
}

// ─── RENDER LISTA ───────────────────────────────
function renderList() {
  const list = filtered();
  const el = document.getElementById('card-list');

  if (list.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>No se encontraron estudiantes</p></div>`;
    return;
  }

  el.innerHTML = list.map(s => {
    const sc  = statusClass[s.vinculacion] || '';
    const bc  = badgeClass[s.vinculacion]  || '';
    const lbl = s.vinculacion || 'Sin estado';
    return `
    <div class="card ${sc}" onclick="openModal(${s.row})">
      <div class="status-badge ${bc}">${lbl}</div>
      <div class="card-name">${s.nombre}</div>
      <div class="card-meta">
        <span class="meta-chip">📚 ${s.carrera}</span>
        <span class="meta-chip">🎓 ${s.nivel}</span>
        <span class="meta-chip">🌙 ${s.jornada}</span>
      </div>
    </div>`;
  }).join('');
}

// ─── MODAL ──────────────────────────────────────
function openModal(row) {
  const s = allStudents.find(x => x.row === row);
  if (!s) return;
  editingRow = row;
  selectedStatus = s.vinculacion;

  document.getElementById('modal-name').textContent = s.nombre;
  document.getElementById('modal-sub').textContent  = `${s.carrera} · ${s.nivel} · ${s.jornada}`;

  highlightOpts(s.vinculacion);
  document.getElementById('save-btn').disabled = true;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    editingRow = null; selectedStatus = null;
  }
}

function selectStatus(val) {
  selectedStatus = val;
  highlightOpts(val);
  const s = allStudents.find(x => x.row === editingRow);
  document.getElementById('save-btn').disabled = (s && s.vinculacion === val);
}

function highlightOpts(val) {
  const opts = document.querySelectorAll('.status-opt');
  const map = {
    'En curso':                       'sel-en-curso',
    'Sin realizar':                   'sel-sin-real',
    'Culminado con documentación':    'sel-con-doc',
    'Culminado sin documentación':    'sel-sin-doc',
  };
  opts.forEach(o => {
    const txt = o.textContent.trim().replace(/^[^\w]+/,'');
    // clear all sel classes
    Object.values(map).forEach(c => o.classList.remove(c));
    if (txt === val || o.textContent.includes(val.substring(0,6))) {
      o.classList.add(map[val] || '');
    }
  });
  // precise match
  opts.forEach(o => {
    Object.values(map).forEach(c => o.classList.remove(c));
  });
  opts.forEach(o => {
    const labels = ['En curso','Sin realizar','Culminado con documentación','Culminado sin documentación'];
    labels.forEach(lbl => {
      if (o.textContent.includes(lbl) && lbl === val) {
        o.classList.add(map[lbl]);
      }
    });
  });
}

// ─── GUARDAR ────────────────────────────────────
async function saveStatus() {
  if (!editingRow || !selectedStatus) return;
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Guardando...';
  btn.disabled = true;

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateVinculacion', row: editingRow, value: selectedStatus }),
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    // Actualizar localmente
    const s = allStudents.find(x => x.row === editingRow);
    if (s) s.vinculacion = selectedStatus;

    document.getElementById('overlay').classList.remove('open');
    renderStats();
    renderList();
    toast('✅ Estado actualizado');
  } catch (e) {
    console.error(e);
    toast('⚠️ Error al guardar. Intenta de nuevo.');
  } finally {
    btn.textContent = 'Guardar cambio';
    btn.disabled = false;
  }
}

// ─── TOAST ──────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── INIT ───────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Inicializar pills con data-val
  const pills = document.querySelectorAll('.pill');
  const vals = ['', 'En curso', 'Sin realizar', 'Culminado con documentación', 'Culminado sin documentación'];
  pills.forEach((p,i) => { p.dataset.val = vals[i] || ''; });

  if (APPS_SCRIPT_URL === 'TU_URL_DE_APPS_SCRIPT_AQUI') {
    toast('⚠️ Modo demo — configura Apps Script');
    loadDemo();
  } else {
    loadData();
  }
});
</script>
